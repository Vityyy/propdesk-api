spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

server:
  servlet:
    context-path: /

jwt:
  secret: super_secret_test_key_that_is_at_least_32_characters_long_for_security_reasons
  algorithm: HS256
  accessDuration: 3600000
  refreshDuration: 3600000
